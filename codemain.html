<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Embedder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        #embed-container {
            margin-top: 20px;
            width: 560px;
            height: 315px;
        }
        iframe {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <h1>YouTube URL Embedder</h1>
    <input type="text" id="youtube-url" placeholder="Paste YouTube URL here" size="50">
    <button id="embed-btn">Embed Video</button>
    <div id="embed-container"></div>

    <script>
        function getVideoId(url) {
            const regex = /(?:https?:\/\/(?:www\.)?youtu(?:\.be\/|be\.com\/(?:watch\?v=|embed\/))([\w-]{11}))/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        document.getElementById('embed-btn').addEventListener('click', () => {
            const url = document.getElementById('youtube-url').value.trim();
            const videoId = getVideoId(url);
            const container = document.getElementById('embed-container');
            if (videoId) {
                container.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            } else {
                container.innerHTML = '<p style="color:red;">Invalid YouTube URL</p>';
            }
        });
    </script>
</body>
</html>
